title: Geometry and Mathematical Physics
description: Research group website for geometry, mathematical physics, string theory, and related areas.
url: "https://geommphys.github.io"
baseurl: ""
timezone: Europe/Madrid
lang: en

markdown: kramdown
kramdown:
  input: GFM

permalink: pretty

defaults:
  - scope:
      path: ""
    values:
      layout: page

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

sass:
  style: compressed

exclude:
  - AGENTS.md
  - DEVELOPING.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - private/
  - internal/
  - migration-notes/
  - google-sites-export/
  - node_modules/
  - .bundle/
  - vendor/
  - .agents/
  - .codex/
