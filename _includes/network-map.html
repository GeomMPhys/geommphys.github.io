{% assign network = site.data.network %}
{%- assign all_people = site.data.people.researchers_madrid
      | concat: site.data.people.students_madrid
      | concat: site.data.people.international_collaborators
      | concat: site.data.people.visitors -%}

    <defs>
      <linearGradient id="network-map-line" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#b96528" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#8263a0" stop-opacity="0.4" />
      </linearGradient>
    </defs>

    <g class="network-map__connections" aria-hidden="true" fill="none" stroke="url(#network-map-line)" stroke-linecap="round" stroke-width="1.4">
      {% for location in network.locations %}
        <path d="{{ location.curve }}" />
      {% endfor %}
    </g>

    <g class="network-map__points">
      {% for location in network.locations %}
        <g class="network-map__point" tabindex="0" role="button" data-i="{{ forloop.index0 }}" aria-label="{{ location.label }}">
          <title>{{ location.label }}</title>
          <circle class="network-map__hit" cx="{{ location.x }}" cy="{{ location.y }}" r="11" fill="transparent" />
          <circle class="network-map__halo" cx="{{ location.x }}" cy="{{ location.y }}" r="4.6" fill="#8263a0" fill-opacity="0" />
          <circle class="network-map__dot" cx="{{ location.x }}" cy="{{ location.y }}" r="4.6" fill="#8263a0" stroke="#ffffff" stroke-width="2" />
        </g>
      {% endfor %}
      <g class="network-map__point network-map__point--home" aria-hidden="true">
        <title>{{ network.center.label }}</title>
        <circle class="network-map__pulse" cx="{{ network.center.x }}" cy="{{ network.center.y }}" r="13" fill="none" stroke="#d3a071" stroke-opacity="0.72" stroke-width="2" />
        <circle class="network-map__home" cx="{{ network.center.x }}" cy="{{ network.center.y }}" r="6.5" fill="#b96528" stroke="#ffffff" stroke-width="2" />
      </g>
    </g>

    <g class="network-map__labels" aria-hidden="true" fill="#64665d">
      <text x="505" y="128">Madrid</text>
      <text x="545" y="74">Europe</text>
      <text x="285" y="94">Massachusetts</text>
      <text x="884" y="108">Kyoto</text>
      <text x="797" y="171">Singapore</text>
    </g>

    <!-- Europe inset: the tight European cluster, zoomed so each point is tappable -->
    <g class="network-map__inset">
      <rect x="486" y="70" width="94" height="46" rx="4" fill="none" stroke="#b7968f" stroke-opacity="0.55" stroke-width="1" />
      <path d="M 486 116 L 306 202" fill="none" stroke="#c1bbb2" stroke-width="0.8" stroke-dasharray="3 3" />
      <rect x="92" y="196" width="214" height="128" rx="8" fill="#eef3f4" stroke="#c7d2ce" stroke-width="1.2" />
      <clipPath id="network-map-eu-clip"><rect x="92" y="196" width="214" height="128" rx="8" /></clipPath>
      <g clip-path="url(#network-map-eu-clip)">
        <use href="#network-map-land" transform="translate(199,260) scale(2.2) translate(-532,-92)" />
      </g>
      <text x="101" y="213" fill="#64665d" font-size="11" font-weight="700">Europe</text>
      {%- assign mix = network.center.x | minus: 532 | times: 2.2 | plus: 199 -%}
      {%- assign miy = network.center.y | minus: 92 | times: 2.2 | plus: 260 -%}
      <circle cx="{{ mix }}" cy="{{ miy }}" r="5.5" fill="#b96528" stroke="#ffffff" stroke-width="2" />
      {%- for location in network.locations -%}{%- if location.inset -%}
        {%- assign ix = location.x | minus: 532 | times: 2.2 | plus: 199 -%}
        {%- assign iy = location.y | minus: 92 | times: 2.2 | plus: 260 -%}
        <g class="network-map__point" tabindex="0" role="button" data-i="{{ forloop.index0 }}" aria-label="{{ location.label }}">
          <title>{{ location.label }}</title>
          <circle class="network-map__hit" cx="{{ ix }}" cy="{{ iy }}" r="11" fill="transparent" />
          <circle class="network-map__halo" cx="{{ ix }}" cy="{{ iy }}" r="4.6" fill="#8263a0" fill-opacity="0" />
          <circle class="network-map__dot" cx="{{ ix }}" cy="{{ iy }}" r="4.6" fill="#8263a0" stroke="#ffffff" stroke-width="2" />
        </g>
      {%- endif -%}{%- endfor -%}
    </g>
  </svg>

  </div>
  <div class="network-map__tooltip" role="status" aria-live="polite" hidden></div>
  <figcaption class="network-map__hint">Hover or tap a point to see collaborators.</figcaption>

  <script>
    window.GEOMM_NETWORK = [
    {%- for location in network.locations -%}
      { "label": {{ location.label | jsonify }}, "subtitle": {{ location.subtitle | default: '' | jsonify }}, "members": [
        {%- for m in location.members -%}
          {%- if m.name -%}{{ m.name | jsonify }}
          {%- else -%}{%- assign mp = all_people | where: 'id', m | first -%}{{ mp.name | default: m | jsonify }}{%- endif -%}
          {%- unless forloop.last -%},{%- endunless -%}
        {%- endfor -%}
      ] },
    {%- endfor -%}
    ];
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var fig = document.querySelector('.network-map');
      if (!fig) { return; }
      var frame = fig.querySelector('.network-map__frame');
      var tip = fig.querySelector('.network-map__tooltip');
      var data = window.GEOMM_NETWORK || [];

      function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }

      function show(el) {
        var d = data[parseInt(el.getAttribute('data-i'), 10)];
        if (!d) { return; }
        var html = '<strong>' + esc(d.label) + '</strong>';
        if (d.subtitle) { html += '<span class="network-map__tt-sub">' + esc(d.subtitle) + '</span>'; }
        if (d.members && d.members.length) {
          html += '<ul>' + d.members.map(function (m) { return '<li>' + esc(m) + '</li>'; }).join('') + '</ul>';
        }
        tip.innerHTML = html;
        tip.hidden = false;
        tip.style.left = '0px';
        var fr = fig.getBoundingClientRect();
        var dot = el.querySelector('.network-map__dot').getBoundingClientRect();
        var w = tip.offsetWidth;
        var cx = dot.left - fr.left + dot.width / 2;
        // clamp the tooltip's left edge so it never leaves the map frame
        var left = Math.max(4, Math.min(cx - w / 2, fr.width - w - 4));
        tip.style.left = left + 'px';
        // flip below the dot when there isn't room above
        var below = (dot.top - fr.top) < tip.offsetHeight + 20;
        tip.classList.toggle('network-map__tooltip--below', below);
        tip.style.top = (below ? dot.bottom - fr.top : dot.top - fr.top) + 'px';
      }
      function hide() { tip.hidden = true; }

      fig.querySelectorAll('.network-map__point[data-i]').forEach(function (el) {
        el.addEventListener('mouseenter', function () { show(el); });
        el.addEventListener('mouseleave', hide);
        el.addEventListener('focus', function () { show(el); });
        el.addEventListener('blur', hide);
        el.addEventListener('click', function (e) { e.stopPropagation(); show(el); });
        el.addEventListener('keydown', function (e) { if (e.key === 'Escape') { hide(); el.blur(); } });
      });
      document.addEventListener('click', hide);
    });
  </script>
</figure>
