<footer class="site-footer">
  <div class="container site-footer__inner">
    <div>
      <strong>{{ site.data.site.group_name }}</strong>
      <p>Research group based in Madrid, contact us at <a href="mailto:{{ site.data.site.email }}">{{ site.data.site.email }}</a></p>
    </div>
    <div class="site-footer__links">
      {% for link in site.data.site.links %}
        <a href="{{ link.url }}">{{ link.label }}</a>
      {% endfor %}
    </div>
  </div>
</footer>
