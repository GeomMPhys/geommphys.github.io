{% assign publication = include.publication %}
<article class="publication">
  <div class="publication__body">
    <h3>{{ publication.title }}</h3>
    <p class="publication__authors">{{ publication.authors }}</p>
    <p class="publication__venue">{{ publication.venue }}</p>
  </div>
  <p class="publication__links">
    {% if publication.arxiv and publication.arxiv != "" %}<a href="https://arxiv.org/abs/{{ publication.arxiv }}">arXiv:{{ publication.arxiv }}</a>{% endif %}
    {% if publication.doi and publication.doi != "" %}<a href="https://doi.org/{{ publication.doi }}">DOI</a>{% endif %}
  </p>
</article>
