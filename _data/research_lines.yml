# ───────────────────────────────────────────────────────────────────
#  RESEARCH LINES  →  shown on the "Research Lines" page
# ───────────────────────────────────────────────────────────────────
#  HOW TO EDIT
#  • Each "- id:" block is one research line. Copy a block to add one.
#
#  FIELDS
#    id           (required)  short nickname, lowercase-with-hyphens
#    name         (required)  line title, in quotes
#    keywords     (optional)  list of short phrases
#    description  (required)  one paragraph, in quotes
#    people       (required)  list of person ids from people.yml; shown
#                             as links to each person on the People page
#
#  TIP: every entry in "people" must be an id that exists in people.yml.
# ───────────────────────────────────────────────────────────────────

lines:
  - id: Multisymplectic-field-theory
    name: "Multisymplectic Field Theory"
    keywords:
      - multisymplectic geometry
      - geometric mechanics
      - graded Poisson structures
      - covariant Hamiltonian formalism of field theories
    description: "Multisymplectic geometry gives an intrinsic formulation of the Hamiltonian formalism of field theories. It is a natural generalization of symplectic geometry, which is the geometric framework for classical mechanics. This approach allows for a covariant description of the dynamics of fields, and it provides a natural setting for the study of symmetries and conservation laws."
    people:
      - manuel-de-leon
      - jordi-gaset-rifa
      - manuel-lainz
      - ruben-izquierdo-lopez
      - marco-maceda
      - matteo-dellacqua

  - id: beyond-integrability
    name: "Beyond Integrability"
    keywords:
      - pseudointegrable systems
      - Arnold-Liouville integrability
      - Abelian Lie groupoids
      - Lie algebroids
    description: "This line of research focuses on systems that go beyond traditional integrability. We focus on systems which are not integrable in the classical Arnold-Liouville sense, but which share some of their properties, as having conserved quantities or being non-chaotic. Nevertheless, they might have a more complex structure, as having folliations by submanifolds whith different topology than tori (higher genus, non-compact), or situations in field theories instead of mechanics. We use Lie-groupoid theory in order to describe their symmetries, generalizing the role of abelian Lie groups."
    people:
      - manuel-de-leon
      - jordi-gaset-rifa
      - manuel-lainz
      - victor-jimenez
      - saskia-demulder
      
      
  - id: quantum-systems
    name: "Quantum systems and topological phases of matter"
    keywords:
      - Quantum information
      - Quantum many-body systems
      - Foundations of Quantum Mechanics
      - Hopf algebras
    description: "We study quantum systems whose physical behaviour is governed by topology, algebraic structures and generalized notions of symmetry. A central focus is the mathematical description of anyonic excitations: quasiparticles in two-dimensional systems whose exchange properties are governed by braid-group representations rather than ordinary bosonic or fermionic statistics. We also aim to place anyonic statistics within a common operational framework, with applications to the foundations of quantum theory and to the information-theoretic structure of topological quantum computation."
    people:
      - alberto-ruiz-de-alarcon
      - david-trillo
      - saskia-demulder
