# ───────────────────────────────────────────────────────────────────
#  AWARDS & HONOURS  →  shown on the "Awards and Honours" page
# ───────────────────────────────────────────────────────────────────
#  HOW TO EDIT
#  • Add an award by copying a "- person:" block.
#  • 2 spaces before "-". Quote text that has a colon (:) in it.
#
#  FIELDS
#    person    (required)  the person's id from people.yml
#    award     (required)  name of the award, in quotes
#    category  (optional)  e.g. "PhD scholarship", "Researcher certification"
#    year      (required)  four digits, no quotes
#
#  TIP: "person" must match an id in people.yml. Add the person there
#       first if they are new.
# ───────────────────────────────────────────────────────────────────

