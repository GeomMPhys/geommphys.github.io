  - title: "Confinement-deconfinement transition in gauge matrix models"
    speaker: "Sachindeo Vaidya"
    affiliation: "Indian Institute of Science"
    date: 2026-02-17
    time: "13:30"
    location: "LPC F1.2"
    abstract: "We will discuss the matrix model of two-color one-flavor adjoint QCD in the weak coupling regime, and show that there is a quantum phase transition at g*0≃ 0.143: for g < g∗0 , the ground state wavefunction is localized in a small region of the gauge configuration space, while for g > g∗0, it gets delocalized over a much larger region. The transition between these two phases is singular, with the ground state at g∗0 being distinctly different from that of g∗0 ±|ϵ|. At g∗0, we will see that the square of the chromoelectric field vanishes, strongly suggesting that the system is in a “dual superconductor” phase. Numerical evidence shows that the localization-delocalization phenomenon holds for the 1st and 2nd excited states as well, leading us to conjecture that there are an infinite number of isolated singular points accumulating to g=0. The model formally possesses N= 1 supersymmetry for a particular choice of parameters. We show that in the localized phase the supermultiplet structure is disrupted and SUSY is thus spontaneously broken."

  - title: "A Random Matrix view of Quantum Spin and Fermionic chains"
    speaker: "Miguel Tierz"
    affiliation: "Shanghai Institute for Mathematics and Interdisciplinary Sciences"
    date: 2026-02-09
    time: "13:30"
    location: "F2.1"
    abstract: "Abstract: We present a Random Matrix Theory (RMT) formulation of the Loschmidt echo for various one-dimensional spin and fermionic chain models. Unlike standard ensembles, the real-time dynamics of these systems require models with complex weights. By analyzing these ensembles, we characterize novel third-order dynamical quantum phase transitions. We conclude by applying this framework to quantum thermodynamics, demonstrating its utility to characterize work distributions for sudden quenches."

  - title: "How quantum gravity breaks EFTs optimally (in the 2-Wasserstein sense)"
    speaker: "Saskia Demulder"
    affiliation: ""
    date: 2025-11-25
    time: "14:00"
    location: "PIR 1.3"
    abstract: "I will outline a formulation of distances between effective theories arising from string flux compactifications using 2-Wasserstein transport on scalar field-space probability measures, with scalar potentials and reduced Einstein dynamics encoded through Tonelli optimal transport and control."

  - title: "Kanatchikov's quantization: problems and perspectives"
    speaker: "Marco D. Maceda"
    affiliation: ""
    date: 2025-10-24
    time: "15:00"
    location: "PIR 1.3"
    abstract: "In this talk I explain, in a self-contained way, Kanatchikov’s approach to field quantization. I introduce the graded Poisson brackets and apply the Dirac algorithm of quantization to obtain the operators associated with each classical observable. I discuss several problems of Kanatchikov’s quantization map, including the emergence of non-commutative and non-associative algebras. Finally, I explore a systematic approach based on geometric quantization, leading to higher geometric settings in which quantization becomes possible."

