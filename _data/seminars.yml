  - title: "Poisson Geometry and Bi-Hamiltonian Systems: From Manifolds to Lie Groups"
    speaker: "Zohreh Ravanpak"
    affiliation: "Nanyang Technological University, Singapore"
    date: 2025-09-05
    time: "13:30"
    location: "Online"
    abstract: "In this talk, I will present an overview of the rich interplay between geometry and dynamics, with Poisson structures at the core of the geometric framework, together with additional structures such as Lie group structures, Nijenhuis structures, and Riemannian metrics. Beginning with the classical theory of Poisson manifolds and Hamiltonian systems, I will discuss how Poisson structures interact with other geometric structures—sometimes subject to compatibility conditions. I will then show how these coupled structures provide a natural setting for bi-Hamiltonian dynamics and dissipative systems. Through examples, we will see how geometry provides an organizing framework for these dynamical systems."

