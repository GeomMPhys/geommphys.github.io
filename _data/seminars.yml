  - title: "On the theory of G-structures applied to multisymplectic manifolds"
    speaker: "Rubén Izquierdo-López"
    affiliation: ""
    date: 2026-06-09
    time: "11:00"
    location: "PIR 2.3"
    abstract: "Multisymplectic geometry provides a geometric framework to express the equations of motion of classical field theories, in analogy with how symplectic geometry is used in classical mechanics. A multisymplectic form encodes key structures of a given theory, including symmetries, conserved quantities, and the Poisson bracket. In the study of these structures, the use of adapted (or Darboux) coordinates is of central importance. However, unlike in symplectic geometry, the closedness of a multisymplectic form is not sufficient to guarantee the existence of flat coordinates. Indeed, there are examples of closed forms of constant linear type that are not flat, such as those arising in $G_2$-structures. These issues can be understood in a unified way through the theory of G-structures. In this talk, I will introduce the basic notions of G-structures and structure tensors. I will then explain how this framework can be used to construct forms whose integrability depends strictly on conditions of order $k$, for arbitrary $k$. Finally, if time permits, I will discuss some possible directions and ideas related to integrability. "

  - title: "Entanglement through topological interfaces in CFT revisited"
    speaker: "Christian Northe"
    affiliation: "Prague Institute for Physics"
    date: 2026-05-08
    time: "14:00"
    location: "PIR 1.3"
    abstract: "Present theoretical predictions for the entanglement entropy through topological defects are violated in numerical simulations of critical systems. In this talk, I introduce a new formalism for the preparation of reduced density matrices in the presence of topological defects, and emphasize the role of defect networks with which they can be dressed. Grouplike and duality defects are considered in detail for the Ising model, establishing agreement with numerically found entanglement entropies. Since this new construction functions at the level of reduced density matrices, it accounts for topological defects beyond the entanglement entropy to other entanglement measures. The framework employs boundary conformal field theory techniques to implement the factorization of Hilbert space, which I recapitulate at the beginning of the talk and discuss its relation with the entanglement spectrum."

  - title: "Undecidability of the spectral gap in rotationally symmetric Hamiltonians"
    speaker: "Laura Castilla"
    affiliation: "Universidad Complutense de Madrid"
    date: 2026-04-29
    time: "15:00"
    location: "PIR 1.21"
    abstract: "Since the works of Gödel and Turing, we know that there exist mathematical statements that can neither be proved nor disproved. As we use mathematics to describe the physical world, it’s natural to ask whether similar limits arise in physics. This topic has gained renewed attention in recent years, driven by the developments in quantum information theory. Starting with an overview of undecidability, we will delve into how some physical models can indeed exhibit undecidable behaviour. In particular, in quantum many-body systems, the spectral gap problem is undecidable, even in the presence of symmetries."

  - title: "Topological phases, boundary theories and renormalization flows"
    speaker: "Alberto Ruiz de Alarcón"
    affiliation: ""
    date: 2026-04-27
    time: "13:30"
    location: "A2.1"
    abstract: "A recurring theme in mathematics and physics is the emergence of collective behaviour from many interacting constituents. Tensor network methods provide a versatile framework for describing such phenomena and have found applications in areas such as machine learning, statistics and differential equations. In the theory of strongly correlated quantum systems, they have in particular become a fundamental tool, providing a natural setting for phenomena such as topological order and revealing deep connections with quantum information, condensed matter physics, low-dimensional topology and operator algebras. This talk presents an overview of a series of works on the theory of tensor networks, their associated symmetries and the phases of matter they describe. Starting from two-dimensional topological models, most notably the Kitaev quantum double and Levin-Wen string-net models, which provide exactly solvable realizations of such phases and are widely believed to capture all non-chiral ones, we show how essential features are encoded in their one-dimensional boundaries, a so-called bulk-boundary correspondence. This point of view provides a framework in which their phases can be defined and classified, and their dynamics realized through local Lindbladian evolutions. It also allows renormalization to be formulated intrinsically at the level of these boundary theories, leading to algebraic descriptions of renormalization flows and new attainable fixed points. This talk is based on Refs. 2204.05940, 2204.06295, 2509.23734, 2501.10552, and work in preparation with Léo Le-Nestour, David Pérez-García and Yoshiko Ogata."

  - title: "What Do Incomplete Models Tell Us About the World?"
    speaker: "Markus Maier"
    affiliation: "Munich School of Philosophy"
    date: 2026-04-16
    time: "15:00"
    location: "PIR 2.5"
    abstract: "Philosophy and physics share a long common history. The generation that built relativity and quantum mechanics — Einstein, Bohr, Heisenberg, Boltzmann, Poincaré — regarded philosophical questions as inseparable from physical inquiry. This talk is an invitation to revisit that tradition. After a brief introduction to philosophy and its methods, I will discuss two important issues in contemporary philosophy of science: scientific explanation and the role of models. There is an evident connection between both topics, as physicists typically explain not by deriving phenomena from fundamental laws, but through idealized, purpose-built models of target systems. This discussion provides a potential starting point for various case studies from modern physics, such as renormalization and effective field theories. My aim is not to offer definitive answers but to open a conversation about where the interests of philosophers and physicists might productively meet."

  - title: "Multisymplectic formalism for manifolds with boundary"
    speaker: "Marco D. Maceda"
    affiliation: ""
    date: 2026-03-23
    time: "14:00"
    location: "PIR 1.10"
    abstract: "In this talk, I will present a new formalism for studying the field theories on manifolds with boundary. Based on the ideas of relative cohomology [Margalef-Bentabol & Villaseñor, 2021], I will extend the definition of multisymplectic structures to manifolds with boundary. We will see how this structure reproduces the field equations of variational principles with boundary. I will explain how to generalize the observables, the graded Poisson brackets, and the conserved charges to manifolds with boundary. Moreover, I will present the Lagrangian formalism, deriving the Poincaré–Cartan form and the Euler–Lagrange equations. Finally, I will illustrate the formalism with several examples.
"

