# ───────────────────────────────────────────────────────────────────
#  NAVIGATION MENU  →  the top menu shown on every page
# ───────────────────────────────────────────────────────────────────
#  HOW TO EDIT
#  • Each "- title:" is a menu item; "url" is where it links.
#  • For a dropdown, use "children:" with indented "- title:/url:" items
#    (see "Research" below). Order here = order on screen.
#  • Keep the 2-space indentation. No TABS.
#
#  FIELDS
#    title     (required)  text shown in the menu
#    url       (links)     destination, e.g. /people/
#    children  (dropdowns) a list of { title, url } items
# ───────────────────────────────────────────────────────────────────

- title: Home
  url: /
- title: People
  url: /people/
- title: Calendar
  url: /calendar/
- title: Research
  children:
    - title: Research Lines
      url: /research-lines/
    - title: Publications
      url: /publications/
    - title: Research Visits
      url: /research-visits/
    - title: Group Seminars
      url: /seminars/
    - title: Conferences and Workshops
      url: /conferences-workshops/
    - title: Awards and Honours
      url: /awards-honours/
- title: Outreach and Diversity
  children:
    - title: Outreach
      url: /outreach/
    - title: Diversity
      url: /diversity/
