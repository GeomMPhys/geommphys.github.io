# ───────────────────────────────────────────────────────────────────
#  INTERNATIONAL NETWORK MAP  →  the SVG map on the "People" page
# ───────────────────────────────────────────────────────────────────
#  This file is more delicate than the others: it positions dots on a
#  map. Editing TEXT is safe; changing NUMBERS moves things.
#
#  HOW TO EDIT
#  • To update a place, edit its "label", "subtitle", or "members".
#  • "members" is a list of person ids from people.yml (the same ids used
#    everywhere else). Hover or tap a dot on the map to see the place, its
#    institution (subtitle) and its members' names, resolved from people.yml.
#    For someone not in people.yml, write  - { name: "Full Name" }  instead.
#  • The x / y numbers position the dot on the map — only change them when
#    adding or moving a location, and always preview the result.
#
#  FIELDS (per location)
#    label     (required)  place name, in quotes
#    subtitle  (required)  institution, in quotes
#    members   (required)  list of person ids from people.yml
#    x, y      (required)  position on the map (numbers)
#    inset     (optional)  true for European locations — they also appear,
#                          spread out and tappable, in the zoomed "Europe"
#                          inset (the cluster is too tight to tap otherwise)
# ───────────────────────────────────────────────────────────────────

